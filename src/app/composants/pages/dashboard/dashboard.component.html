<div class="app-shell">
  <aside class="sidebar">
    <div class="brand">
      <div class="brand-mark">
        <i class="bi bi-kanban"></i>
      </div>
      <div>
        <strong>GestionPro</strong>
        <span>Commandes & factures</span>
      </div>
    </div>

    <nav class="sidebar-nav" aria-label="Navigation principale">
      <a
        *ngFor="let item of navItems"
        class="nav-link"
        [routerLink]="item.route"
        routerLinkActive="active"
      >
        <i [class]="item.icon"></i>
        <span>{{ item.label }}</span>
      </a>
    </nav>

    <div class="sidebar-footer">
      <span class="status-dot"></span>
      <div>
        <strong>Système actif</strong>
        <small>API sécurisée</small>
      </div>
    </div>
  </aside>

  <section class="workspace">
    <header class="topbar">
      <div>
        <p class="eyebrow">Plateforme commerciale</p>
        <h1>Gestion clients, commandes et fournisseurs</h1>
      </div>

      <div class="topbar-actions">
        <a class="quick-action" routerLink="/commandes/add">
          <i class="bi bi-plus-lg"></i>
          Nouvelle commande
        </a>
        <button type="button" class="user-button" (click)="logout()" title="Se déconnecter">
          <i class="bi bi-box-arrow-right"></i>
          Déconnexion
        </button>
      </div>
    </header>

    <main class="content">
      <router-outlet></router-outlet>
    </main>
  </section>
</div>
